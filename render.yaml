services:
  - type: web
    name: fearfree-backend
    runtime: docker
    plan: free
    envVars:
      - key: PORT
        value: "8080"
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: "https://fearfree-frontend.vercel.app"
      - key: DATABASE_URL
        fromDatabase:
          name: fearfree-db
          property: connectionString

databases:
  - name: fearfree-db
    plan: free
    databaseName: fearfree_db
